<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>IKOMA STOCK — Hors ligne</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 24px;
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a;
            color: #f8fafc;
        }
        .mark {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: #f8fafc;
        }
        h1 { font-size: 18px; margin: 0; }
        p { margin: 0; color: #94a3b8; font-size: 14px; max-width: 320px; }
        button {
            margin-top: 8px;
            padding: 10px 24px;
            border-radius: 999px;
            border: none;
            background: #4f46e5;
            color: white;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="mark"></div>
    <h1>IKOMA STOCK</h1>
    <p>Vous êtes hors ligne. Vérifiez votre connexion et réessayez.</p>
    <button onclick="location.reload()">Réessayer</button>
</body>
</html>
